<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="AI Hydra Threat Capability Framework — tracking the convergence of autonomous AI and offensive cyber tooling.">
<meta name="theme-color" content="#0d1117">

<title>The AI Hydra — Threat Capability Framework</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden}
body{background:#0D1117;color:#E6EDF3;font-family:'Segoe UI',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
a{color:#58A6FF;text-decoration:none}a:hover{text-decoration:underline!important}
button{font-family:inherit}button:hover{opacity:.8}

<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useMemo,useEffect}=React;

const STATUS = {
  exists: { color: "#00D4AA", bg: "rgba(0,212,170,0.06)", border: "rgba(0,212,170,0.2)", label: "Exists Today" },
  partial: { color: "#FFAA33", bg: "rgba(255,170,51,0.06)", border: "rgba(255,170,51,0.2)", label: "Partially Exists" },
  gap: { color: "#FF6B6B", bg: "rgba(255,107,107,0.06)", border: "rgba(255,107,107,0.2)", label: "Engineering Gap" },
};
const SEVERITY = { critical: { color: "#FF6B6B", label: "CRIT" }, high: { color: "#FFAA33", label: "HIGH" }, medium: { color: "#58A6FF", label: "MED" }, low: { color: "#8B949E", label: "LOW" } };

function StatusDot({ status, size = 9 }) {
  return <span style={{ display: "inline-block", width: size, height: size, borderRadius: "50%", background: STATUS[status].color, flexShrink: 0 }} />;
}

function SeverityBadge({ severity }) {
  const s = SEVERITY[severity];
  return <span style={{ fontSize: 9, fontWeight: 800, color: s.color, background: `${s.color}12`, border: `1px solid ${s.color}25`, padding: "2px 7px", borderRadius: 3, letterSpacing: 1.5, fontFamily: "monospace" }}>{s.label}</span>;
}

function TabBar({ tabs, active, onChange }) {
  return (
    <div style={{ display: "flex", marginBottom: 24, overflowX: "auto" }}>
      <div style={{ display: "inline-flex", gap: 3, padding: 3, background: "#161B22", border: "1px solid #21262d", borderRadius: 8 }}>
        {tabs.map(t => {
          const on = active === t.id;
          return (
            <button key={t.id} onClick={() => onChange(t.id)} style={{
              padding: "8px 16px", border: "none", cursor: "pointer", borderRadius: 5,
              fontFamily: "monospace", fontSize: 11, fontWeight: on ? 800 : 700, whiteSpace: "nowrap",
              background: on ? "#00D4AA" : "transparent",
              color: on ? "#0D1117" : "#8B949E",
              transition: "background .15s, color .15s",
            }}>
              {t.label}{t.count !== undefined && <span style={{ marginLeft: 6, opacity: on ? 0.65 : 0.5 }}>({t.count})</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ============================================
// ARCHITECTURE — SVG layered diagram
// ============================================
function Architecture() {
  const W = 960, H = 620;
  const Layer = ({ y, h, color, label, tag, children }) => (
    <g>
      <rect x={20} y={y} width={680} height={h} rx={6} fill="#161B22" stroke={color} strokeWidth={1.2} />
      <rect x={20} y={y} width={680} height={3} rx={2} fill={color} />
      <text x={36} y={y+20} fill={color} fontSize={9} fontWeight={800} fontFamily="monospace" letterSpacing={1.5}>{label}</text>
      <text x={36 + label.length * 7} y={y+20} fill="#6e7681" fontSize={8} fontFamily="sans-serif"> ({tag})</text>
      {children}
    </g>
  );
  const Box = ({ x, y, w, h, text, color = "#8B949E" }) => (
    <g>
      <rect x={x} y={y} width={w} height={h} rx={3} fill="#0d1117" />
      <text x={x + w/2} y={y + h/2 + 3} fill={color} fontSize={8} textAnchor="middle" fontFamily="sans-serif">{text}</text>
    </g>
  );

  return (
    <div style={{ position: "relative", left: "50%", width: "100vw", marginLeft: "-50vw", padding: "0 16px", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", maxWidth: 1600, display: "block", margin: "0 auto" }}>
        {/* Layer 1: Operator */}
        <Layer y={10} h={72} color="#FFAA33" label="OPERATOR CONTROL PLANE" tag="Human">
          {["Target Designation", "Objective Definition", "Risk Tolerance", "Strategic Overrides", "Sprint Review"].map((t, i) => (
            <Box key={i} x={36 + i * 128} y={34} w={118} h={36} text={t} />
          ))}
        </Layer>

        {/* Arrow */}
        <line x1={360} y1={82} x2={360} y2={98} stroke="#FFAA33" strokeWidth={1.5} />

        {/* Layer 2: AI Engine */}
        <Layer y={100} h={80} color="#58A6FF" label="AI ORCHESTRATION ENGINE" tag="Semi-Autonomous">
          {["Attack Surface\nAssessment", "Tool & Exploit\nSelection", "Value\nAssessment", "Adaptive\nDecisions", "Gap\nIdentification"].map((t, i) => (
            <Box key={i} x={36 + i * 128} y={126} w={118} h={40} text={t.split('\n')[0]} color="#E6EDF3" />
          ))}
        </Layer>

        {/* Weapons Foundry — right side */}
        <rect x={720} y={10} width={220} height={170} rx={6} fill="#161B22" stroke="#BC8CFF" strokeWidth={0.8} strokeDasharray="5,4" />
        <rect x={720} y={10} width={220} height={3} rx={2} fill="#BC8CFF" opacity={0.7} />
        <text x={734} y={28} fill="#BC8CFF" fontSize={8} fontWeight={800} fontFamily="monospace" letterSpacing={1.2}>WEAPONS FOUNDRY</text>
        <text x={734} y={40} fill="#8B949E" fontSize={7} fontFamily="sans-serif">Adversary SDLC</text>
        {["Backlog Intake", "Sprint Planning", "Exploit Dev & Test", "Implant Build", "OTA Deploy via C2"].map((t, i) => (
          <g key={i}>
            <rect x={732} y={50 + i * 24} width={196} height={19} rx={3} fill="#0d1117" />
            <text x={742} y={63 + i * 24} fill="#BC8CFF" fontSize={8} fontFamily="sans-serif" opacity={0.85}>{t}</text>
          </g>
        ))}

        {/* Foundry arrows */}
        <line x1={700} y1={130} x2={718} y2={120} stroke="#BC8CFF" strokeWidth={0.8} strokeDasharray="4,3" />
        <text x={700} y={112} fill="#BC8CFF" fontSize={6} fontFamily="monospace" opacity={0.6}>gaps →</text>
        <line x1={718} y1={160} x2={700} y2={155} stroke="#BC8CFF" strokeWidth={0.8} strokeDasharray="4,3" />
        <text x={694} y={170} fill="#BC8CFF" fontSize={6} fontFamily="monospace" opacity={0.6}>← implants</text>

        {/* Arrow */}
        <line x1={360} y1={180} x2={360} y2={198} stroke="#00D4AA" strokeWidth={1.5} />

        {/* Layer 3: Hybrid C2 */}

              <text x={kx+26} y={326} fill="#E6EDF3" fontSize={7.5} fontWeight={700} fontFamily="sans-serif">{kc.n.split('\n')[0]}</text>
              {kc.n.includes('\n') && <text x={kx+26} y={336} fill="#E6EDF3" fontSize={7.5} fontWeight={700} fontFamily="sans-serif">{kc.n.split('\n')[1]}</text>}
              {kc.tools.map((tool, j) => (
                <g key={j}>
                  <circle cx={kx+14} cy={358+j*18} r={2} fill={kc.c} opacity={0.4} />

          );
        })}

        {/* Legend */}
        <text x={20} y={530} fill="#8B949E" fontSize={7} fontFamily="monospace">DATA FLOW:</text>
        {[{x:100,c:"#FFAA33",l:"Commands ↓"},{x:200,c:"#00D4AA",l:"Operational C2"},{x:330,c:"#BC8CFF",l:"SDLC pipeline"},{x:460,c:"#FF6B6B",l:"Kill chain →"}].map((lg,i)=>(
          <g key={i}>
            <line x1={lg.x} y1={527} x2={lg.x+30} y2={527} stroke={lg.c} strokeWidth={1.5} strokeDasharray={lg.c==="#BC8CFF"?"4,3":"none"} />
            <text x={lg.x+36} y={530} fill="#6e7681" fontSize={7} fontFamily="sans-serif">{lg.l}</text>
          </g>

  );
}

// ============================================
// GAP ANALYSIS
// ============================================
function GapAnalysis({ gaps, intel }) {
  const [filter, setFilter] = useState("all");
  const [open, setOpen] = useState(null);
  const counts = useMemo(() => { const c = { exists: 0, partial: 0, gap: 0 }; gaps.forEach(g => c[g.status]++); return c; }, [gaps]);
  const total = counts.exists + counts.partial + counts.gap;
  const filtered = filter === "all" ? gaps : gaps.filter(g => g.status === filter);
  const phases = useMemo(() => [...new Set(gaps.map(g => g.phase))], [gaps]);
  const intelByGap = useMemo(() => { const m = {}; intel.forEach(c => (c.gapsAffected || []).forEach(id => { if (!m[id]) m[id] = []; m[id].push(c); })); return m; }, [intel]);

  return (
    <div>
      <div style={{ display: "flex", gap: 2, height: 8, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
        <div style={{ width: `${(counts.exists/total)*100}%`, background: STATUS.exists.color }} />
        <div style={{ width: `${(counts.partial/total)*100}%`, background: STATUS.partial.color }} />
        <div style={{ width: `${(counts.gap/total)*100}%`, background: STATUS.gap.color }} />
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        <button onClick={() => setFilter("all")} style={{ padding: "5px 14px", border: `1px solid ${filter==="all"?"#E6EDF3":"#21262d"}`, borderRadius: 4, background: filter==="all"?"#E6EDF310":"transparent", color: "#E6EDF3", cursor: "pointer", fontSize: 11, fontFamily: "monospace" }}>All ({total})</button>
        {Object.entries(STATUS).map(([k, v]) => (
          <button key={k} onClick={() => setFilter(k)} style={{ padding: "5px 14px", border: `1px solid ${filter===k?v.color:"#21262d"}`, borderRadius: 4, background: filter===k?`${v.color}12`:"transparent", color: v.color, cursor: "pointer", fontSize: 11, fontFamily: "monospace" }}>{v.label} ({counts[k]})</button>
        ))}
      </div>
      {phases.map(phase => {
        const items = filtered.filter(g => g.phase === phase);
        if (!items.length) return null;
        return (
          <div key={phase} style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ color: "#E6EDF3", fontSize: 11, fontWeight: 800, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: 1.5 }}>{phase}</span>
              <div style={{ flex: 1, height: 1, background: "#1b1f27" }} />
            </div>
            {items.map(g => (
              <div key={g.id}>
                <div onClick={() => setOpen(open === g.id ? null : g.id)} style={{ display: "flex", alignItems: "center", padding: "9px 12px", marginBottom: 2, background: STATUS[g.status].bg, borderLeft: `3px solid ${STATUS[g.status].color}`, borderRadius: "0 5px 5px 0", cursor: "pointer" }}>
                  <StatusDot status={g.status} />
                  <span style={{ flex: 1, marginLeft: 10, color: "#E6EDF3", fontSize: 12 }}>{g.name}</span>
                  {g.changed && <span style={{ fontSize: 9, color: "#FFAA33", fontWeight: 800, marginRight: 10, fontFamily: "monospace" }}>⬆ MOVED</span>}
                  <span style={{ color: "#8B949E", fontSize: 10, maxWidth: 280, textAlign: "right" }}>{g.source}</span>
                </div>
                {open === g.id && (
                  <div style={{ margin: "0 0 6px 16px", padding: "10px 14px", background: "#161B22", borderRadius: 5, borderLeft: `2px solid ${STATUS[g.status].color}`, fontSize: 11 }}>
                    <div style={{ color: "#6e7681", marginBottom: 3 }}>Updated: {g.updated}</div>
                    {g.changed && <div style={{ color: "#FFAA33", marginBottom: 3 }}>Changed: {g.changed} (was: {g.previousStatus})</div>}
                    <div style={{ color: "#E6EDF3" }}>{g.source}</div>
                    {g.evidence && <div style={{ marginTop: 6, color: "#58A6FF", fontFamily: "monospace", fontSize: 10 }}>Evidence: {g.evidence}</div>}
                    {intelByGap[g.id] && intelByGap[g.id].length > 0 && (
                      <div style={{ marginTop: 10, borderTop: "1px solid #21262d", paddingTop: 8 }}>
                        <div style={{ fontSize: 9, fontWeight: 700, color: "#8B949E", fontFamily: "monospace", letterSpacing: 1, marginBottom: 6, textTransform: "uppercase" }}>Intelligence ({intelByGap[g.id].length})</div>
                        {intelByGap[g.id].sort((a, b) => b.date.localeCompare(a.date)).map(c => (
                          <div key={c.id} style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4, fontSize: 10 }}>
                            <SeverityBadge severity={c.severity} />
                            <span style={{ color: "#6e7681", fontFamily: "monospace", minWidth: 68 }}>{c.date}</span>
                            <span style={{ color: "#E6EDF3" }}>{c.title}</span>
                            {c.url && <a href={c.url} target="_blank" rel="noopener noreferrer" style={{ color: "#58A6FF", fontSize: 9, flexShrink: 0 }}>source</a>}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ============================================
// INTELLIGENCE
// ============================================
function IntelRegistry({ intel }) {
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [expanded, setExpanded] = useState(null);
  const types = [...new Set(intel.map(i => i.type))];
  const filtered = intel.filter(i => typeFilter === "all" || i.type === typeFilter).filter(i => !search || [i.title, i.summary, i.source, i.analysis || ""].some(f => f.toLowerCase().includes(search.toLowerCase())));

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search intelligence..." style={{ flex: 1, minWidth: 180, padding: "7px 12px", background: "#161B22", border: "1px solid #21262d", borderRadius: 5, color: "#E6EDF3", fontSize: 12, outline: "none", fontFamily: "monospace" }} />
        <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} style={{ padding: "7px 12px", background: "#161B22", border: "1px solid #21262d", borderRadius: 5, color: "#8B949E", fontSize: 11, fontFamily: "monospace" }}>
          <option value="all">All types</option>
          {types.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
      </div>
      <div style={{ fontSize: 10, color: "#8B949E", marginBottom: 14, fontFamily: "monospace" }}>{filtered.length} documents · click a card for thesis analysis</div>
      {filtered.sort((a, b) => b.date.localeCompare(a.date)).map(i => (
        <div key={i.id} style={{ marginBottom: 8, background: "#161B22", borderRadius: 6, border: "1px solid #1b1f27", overflow: "hidden" }}>
          <div onClick={() => setExpanded(expanded === i.id ? null : i.id)} style={{ padding: "14px 16px", cursor: "pointer" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
              <span style={{ color: "#8B949E", fontSize: 10, fontFamily: "monospace", minWidth: 72 }}>{i.date}</span>
              <SeverityBadge severity={i.severity} />
              <span style={{ fontSize: 9, color: "#58A6FF", background: "#58A6FF10", padding: "1px 7px", borderRadius: 3, fontFamily: "monospace" }}>{i.type}</span>
              {i.analysis && <span style={{ fontSize: 9, color: expanded === i.id ? "#00D4AA" : "#8B949E", marginLeft: "auto", fontFamily: "monospace" }}>{expanded === i.id ? "▲ Hide" : "▼ Analysis"}</span>}
            </div>
            <div style={{ color: "#E6EDF3", fontSize: 13, fontWeight: 700, marginBottom: 5 }}>{i.title}</div>
            <div style={{ color: "#8B949E", fontSize: 12.5, lineHeight: 1.55 }}>{i.summary}</div>
          </div>
          {expanded === i.id && i.analysis && (
            <div style={{ borderTop: "1px solid #21262d", padding: "14px 16px", background: "#0d1117" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                <div style={{ width: 3, height: 14, background: "#00D4AA", borderRadius: 2 }} />
                <span style={{ fontSize: 11, fontWeight: 700, color: "#00D4AA", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: 1 }}>Thesis Relevance</span>
              </div>
              <div style={{ color: "#E6EDF3", fontSize: 12, lineHeight: 1.7, marginBottom: 12 }}>{i.analysis}</div>
              {i.capabilityImpact && (
                <div style={{ padding: "8px 12px", background: "#161B22", borderRadius: 4, borderLeft: "3px solid #FFAA33", marginBottom: 10 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#FFAA33", fontFamily: "monospace" }}>CAPABILITY IMPACT: </span>
                  <span style={{ fontSize: 11, color: "#E6EDF3" }}>{i.capabilityImpact}</span>
                </div>
              )}
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 10, color: "#8B949E" }}>{i.source}</span>
                {i.url && <a href={i.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 10, color: "#58A6FF", textDecoration: "none" }}>Source →</a>}
                {i.gapsAffected.length > 0 && <span style={{ fontSize: 9, color: "#00D4AA", fontFamily: "monospace" }}>Affects: {i.gapsAffected.join(", ")}</span>}
              </div>
            </div>
          )}
          {(!i.analysis || expanded !== i.id) && (
            <div style={{ padding: "0 16px 10px", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <span style={{ fontSize: 10, color: "#8B949E" }}>{i.source}</span>
              {i.url && <a href={i.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 10, color: "#58A6FF", textDecoration: "none" }}>Source →</a>}
              {i.gapsAffected.length > 0 && <span style={{ fontSize: 9, color: "#00D4AA", fontFamily: "monospace" }}>Affects: {i.gapsAffected.join(", ")}</span>}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ============================================
// TIMELINE — capability evolution (driven by intel publication dates)
// ============================================
const TL_BANDS = ["exists", "partial", "gap"];
const TL_SHORT = { exists: "EXISTS", partial: "PARTIAL", gap: "GAP" };
function tlRibbon(x0, x1, a0, a1, b0, b1) {
  const xm = (x0 + x1) / 2;
  return `M ${x0} ${a0} C ${xm} ${a0}, ${xm} ${b0}, ${x1} ${b0} L ${x1} ${b1} C ${xm} ${b1}, ${xm} ${a1}, ${x0} ${a1} Z`;
}

function Timeline({ gaps, intel }) {
  const [mode, setMode] = useState("heatmap");
  const [sel, setSel] = useState(null);
  const [hover, setHover] = useState(null);

  const model = useMemo(() => {
    const byId = {}; intel.forEach(c => byId[c.id] = c);
    const capById = {}; gaps.forEach(g => capById[g.id] = g);
    const trans = {};
    gaps.forEach(g => { if (g.evidence && g.previousStatus && byId[g.evidence]) trans[g.id] = { date: byId[g.evidence].date, from: g.previousStatus, to: g.status }; });
    const statusAt = (g, d) => { const t = trans[g.id]; return t ? (d >= t.date ? t.to : t.from) : g.status; };
    const strengthAt = (id, d) => intel.reduce((n, c) => n + ((c.date <= d && (c.gapsAffected || []).includes(id)) ? 1 : 0), 0);
    const dates = Array.from(new Set(intel.map(c => c.date))).sort();
    const phases = []; gaps.forEach(g => { if (!phases.includes(g.phase)) phases.push(g.phase); });
    const rows = []; phases.forEach(ph => gaps.filter(g => g.phase === ph).forEach(g => rows.push(g)));
    const rank = { exists: 0, partial: 1, gap: 2 };
    const order = [...rows].map(g => g.id).sort((a, b) => rank[capById[a].status] - rank[capById[b].status] || a.localeCompare(b));
    const tdates = Array.from(new Set(Object.values(trans).map(t => t.date))).sort();
    const milestones = Array.from(new Set([dates[0], ...tdates, dates[dates.length - 1]])).sort();
    let maxStr = 1; rows.forEach(g => dates.forEach(d => { const s = strengthAt(g.id, d); if (s > maxStr) maxStr = s; }));
    return { byId, capById, trans, statusAt, strengthAt, dates, phases, rows, order, milestones, maxStr };
  }, [gaps, intel]);

  const { byId, capById, trans, statusAt, strengthAt, dates, phases, rows, order, milestones, maxStr } = model;
  if (!dates.length) return null;
  const counts = (d) => { const c = { exists: 0, partial: 0, gap: 0 }; rows.forEach(g => c[statusAt(g, d)]++); return c; };

  // ---------- heatmap geometry ----------
  const LX = 330, TOP = 84, CW = Math.max(30, Math.min(46, Math.round(800 / dates.length))), CH = 18, BOT = 92;
  const HW = LX + dates.length * CW + 22, HH = TOP + rows.length * CH + BOT;
  const isMilestone = j => j > 0 && rows.some(g => statusAt(g, dates[j]) !== statusAt(g, dates[j - 1]));

  // ---------- story (alluvial) layout ----------
  const PR = 0.16, PB = 2.2;
  const story = (() => {
    const cols = milestones.map(d => {
      const th = {}, st = {}; order.forEach(id => { th[id] = 0.8 + 0.5 * strengthAt(id, d); st[id] = statusAt(capById[id], d); });
      const bc = { exists: [], partial: [], gap: [] }; order.forEach(id => bc[st[id]].push(id));
      let tot = PB * 2; TL_BANDS.forEach(b => { tot += bc[b].reduce((s, id) => s + th[id], 0) + PR * Math.max(0, bc[b].length - 1); });
      return { th, st, bc, tot, date: d };
    });
    const H = Math.max(...cols.map(c => c.tot));
    const pos = cols.map(c => { let y = (H - c.tot) / 2; const p = {}; TL_BANDS.forEach(b => { c.bc[b].forEach(id => { p[id] = [y, y + c.th[id]]; y += c.th[id] + PR; }); if (c.bc[b].length) y -= PR; y += PB; }); return p; });
    return { cols, pos, H };
  })();
  const N = milestones.length, SLX = 70, SCW = Math.min(220, Math.round(1180 / Math.max(1, N - 1))), SNW = 24, sTop = 64, sScale = 470 / story.H;
  const SW = SLX + (N - 1) * SCW + SNW + 30, SH = sTop + story.H * sScale + 86;
  const SY = v => sTop + v * sScale;
  const moversAt = (i) => i === 0 ? [] : order.filter(id => story.cols[i].st[id] !== story.cols[i - 1].st[id]);

  const fullbleed = { position: "relative", left: "50%", width: "100vw", marginLeft: "-50vw", padding: "0 16px" };

  return (
    <div style={fullbleed}>
      <div style={{ maxWidth: 1480, margin: "0 auto" }}>
        <p style={{ color: "#8B949E", fontSize: 12, marginBottom: 14, lineHeight: 1.5 }}>
          How the {rows.length} capabilities strengthened over time — anchored to the <b style={{ color: "#E6EDF3" }}>actual publication dates of the {intel.length} intelligence items</b> (a capability moves when the evidence was published, not when it was logged). Colour = status · brightness / ribbon thickness = weight of corroborating intel · ◆ = a status change. Click any step for the intel behind it.
        </p>
        <div style={{ display: "flex", marginBottom: 16 }}>
          <div style={{ display: "inline-flex", gap: 3, padding: 3, background: "#161B22", border: "1px solid #21262d", borderRadius: 8 }}>
            {[{ id: "heatmap", label: "Backbone · heatmap" }, { id: "story", label: "Story · milestones" }].map(t => {
              const on = mode === t.id;
              return <button key={t.id} onClick={() => { setMode(t.id); setSel(null); }} style={{ padding: "7px 14px", border: "none", borderRadius: 5, fontFamily: "monospace", fontSize: 11, fontWeight: on ? 800 : 700, background: on ? "#00D4AA" : "transparent", color: on ? "#0D1117" : "#8B949E" }}>{t.label}</button>;
            })}
          </div>
        </div>

        {mode === "heatmap" && (
          <div style={{ overflowX: "auto" }}>
            <svg viewBox={`0 0 ${HW} ${HH}`} style={{ width: "100%", minWidth: Math.min(HW, 980), display: "block" }}>
              <text x={LX} y={18} fill="#8B949E" fontSize="10" fontFamily="monospace">AGGREGATE  ·  gap → partial → exists  (/{rows.length})</text>
              {dates.map((d, j) => {
                const c = counts(d), x = LX + j * CW + CW * 0.16, bw = CW * 0.68, y0 = 26, hgt = 48, t = rows.length;
                const hg = hgt * c.gap / t, hp = hgt * c.partial / t, he = hgt * c.exists / t;
                return (<g key={d}>
                  <rect x={x} y={y0} width={bw} height={hg} fill={STATUS.gap.color} opacity="0.9" />
                  <rect x={x} y={y0 + hg} width={bw} height={hp} fill={STATUS.partial.color} opacity="0.9" />
                  <rect x={x} y={y0 + hg + hp} width={bw} height={he} fill={STATUS.exists.color} opacity="0.9" />
                </g>);
              })}
              {(() => { const out = []; let y = TOP; phases.forEach((ph, pi) => { const n = rows.filter(g => g.phase === ph).length, y0 = y, y1 = y + n * CH;
                out.push(<g key={ph}>
                  {pi % 2 === 1 && <rect x={LX} y={y0} width={dates.length * CW} height={n * CH} fill="#ffffff" opacity="0.02" />}
                  <line x1={6} y1={y1} x2={LX + dates.length * CW} y2={y1} stroke="#1b1f27" strokeWidth="0.6" />
                  <text x={9} y={(y0 + y1) / 2} fill="#8B949E" fontSize="7.5" fontFamily="monospace" transform={`rotate(-90 9 ${(y0 + y1) / 2})`} textAnchor="middle">{ph.toUpperCase().slice(0, 22)}</text>
                </g>); y = y1; }); return out; })()}
              {rows.map((g, i) => { const y = TOP + i * CH; return (<g key={g.id}>
                <text x={30} y={y + CH / 2 + 3} fill="#E6EDF3" fontSize="9" fontFamily="monospace" textAnchor="start">{g.id}</text>
                <text x={74} y={y + CH / 2 + 3} fill="#8B949E" fontSize="8" textAnchor="start">{g.name.length > 38 ? g.name.slice(0, 37) + "…" : g.name}</text>
                {dates.map((d, j) => { const s = statusAt(g, d), strv = strengthAt(g.id, d), op = 0.24 + 0.76 * (strv / maxStr), x = LX + j * CW + CW * 0.1, w = CW * 0.8;
                  return <rect key={d} x={x} y={y + 1.5} width={w} height={CH - 3} rx="2" fill={STATUS[s].color} fillOpacity={op}
                    stroke={hover && hover.id === g.id && hover.d === d ? "#fff" : "none"} strokeWidth="1"
                    onMouseEnter={() => setHover({ id: g.id, d, s, strv })} onMouseLeave={() => setHover(null)} />;
                })}
              </g>); })}
              {dates.map((d, j) => { const ms = isMilestone(j), x = LX + j * CW + CW / 2; return (<g key={d}>
                {ms && <rect x={LX + j * CW} y={TOP - 2} width={CW} height={rows.length * CH + 4} fill="#ffffff" opacity="0.05" />}
                <rect x={LX + j * CW} y={TOP - 2} width={CW} height={rows.length * CH + 4} fill="transparent" style={{ cursor: "pointer" }} onClick={() => setSel(d)} />
                <text x={x} y={TOP + rows.length * CH + 12} fill={ms ? "#fff" : (sel === d ? "#00D4AA" : "#8B949E")} fontSize="8.5" fontFamily="monospace" fontWeight={ms ? "bold" : "normal"} transform={`rotate(90 ${x} ${TOP + rows.length * CH + 12})`} textAnchor="start">{d}{ms ? "  ◆" : ""}</text>
              </g>); })}
              {hover && <g>
                <rect x={LX + 8} y={4} width={320} height={34} rx="4" fill="#161B22" stroke="#21262d" />
                <text x={LX + 16} y={18} fill="#E6EDF3" fontSize="9" fontFamily="monospace">{hover.id} · {TL_SHORT[hover.s]}</text>
                <text x={LX + 16} y={31} fill="#8B949E" fontSize="8">{capById[hover.id].name} · strength {hover.strv}</text>
              </g>}
            </svg>
          </div>
        )}

        {mode === "story" && (
          <div style={{ overflowX: "auto" }}>
            <svg viewBox={`0 0 ${SW} ${SH}`} style={{ width: "100%", minWidth: Math.min(SW, 900), display: "block" }}>
              {TL_BANDS.map(b => { const ids = story.cols[0].bc[b]; if (!ids.length) return null; const ys = ids.map(id => story.pos[0][id]); const y0 = Math.min(...ys.map(a => a[0])), y1 = Math.max(...ys.map(a => a[1]));
                return <text key={b} x={SLX - 46} y={SY((y0 + y1) / 2)} fill={STATUS[b].color} fontSize="11" fontWeight="bold" fontFamily="monospace" transform={`rotate(-90 ${SLX - 46} ${SY((y0 + y1) / 2)})`} textAnchor="middle">{TL_SHORT[b]}</text>;
              })}
              {Array.from({ length: N - 1 }).map((_, i) => { const x0 = SLX + i * SCW + SNW, x1 = SLX + (i + 1) * SCW;
                return order.map(id => { const [a0, a1] = story.pos[i][id], [b0, b1] = story.pos[i + 1][id], mv = story.cols[i].st[id] !== story.cols[i + 1].st[id], col = STATUS[mv ? story.cols[i + 1].st[id] : story.cols[i].st[id]].color, isM = !!model.trans[id];
                  return <path key={id + i} d={tlRibbon(x0, x1, SY(a0), SY(a1), SY(b0), SY(b1))} fill={col} fillOpacity={isM ? (mv ? 0.95 : 0.6) : 0.4} stroke={mv ? "#fff" : "none"} strokeWidth={mv ? 1.1 : 0} />;
                });
              })}
              {milestones.map((d, i) => { const x = SLX + i * SCW, c = counts(d), mv = moversAt(i); return (<g key={d}>
                {order.map(id => { const [y0, y1] = story.pos[i][id]; return <rect key={id} x={x} y={SY(y0)} width={SNW} height={SY(y1) - SY(y0)} fill={STATUS[story.cols[i].st[id]].color} stroke="#0D1117" strokeWidth="0.4" opacity={model.trans[id] ? 0.95 : 0.78} />; })}
                <rect x={x - 6} y={sTop - 6} width={SNW + 12} height={story.H * sScale + 12} fill="transparent" style={{ cursor: "pointer" }} onClick={() => setSel(d)} />
                <text x={x + SNW / 2} y={sTop - 30} fill="#E6EDF3" fontSize="10" fontWeight="bold" textAnchor="middle">{i === 0 ? "First intel" : (mv.length ? mv.join(", ") : "—")}</text>
                <text x={x + SNW / 2} y={sTop - 17} fill="#8B949E" fontSize="8.5" fontFamily="monospace" textAnchor="middle">{d}</text>
                <text x={x + SNW / 2} y={SY(story.H) + 18} fontSize="9.5" fontFamily="monospace" fontWeight="bold" textAnchor="middle">
                  <tspan fill={STATUS.exists.color}>E-{c.exists}</tspan>
                  <tspan fill={STATUS.partial.color} dx="7">P-{c.partial}</tspan>
                  <tspan fill={STATUS.gap.color} dx="7">G-{c.gap}</tspan>
                </text>
              </g>); })}
            </svg>
          </div>
        )}

        <TimelineDetail date={sel} intel={intel} model={model} />
      </div>
    </div>
  );
}

function TimelineDetail({ date, intel, model }) {
  if (!date) return <div style={{ color: "#8B949E", fontSize: 12, padding: "14px 2px" }}>Select a step above to see the intelligence published at that date and any status changes it drove.</div>;
  const cards = intel.filter(c => c.date === date).sort((a, b) => a.title.localeCompare(b.title));
  const moves = Object.entries(model.trans).filter(([id, t]) => t.date === date);
  const c = model.counts ? model.counts(date) : (() => { const cc = { exists: 0, partial: 0, gap: 0 }; model.rows.forEach(g => cc[model.statusAt(g, date)]++); return cc; })();
  return (
    <div style={{ marginTop: 14, padding: "14px 16px", background: "#161B22", border: "1px solid #21262d", borderRadius: 8 }}>
      <div style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 10, flexWrap: "wrap" }}>
        <span style={{ fontFamily: "monospace", fontWeight: 800, fontSize: 13 }}>{date}</span>
        {TL_BANDS.map(b => <span key={b} style={{ display: "flex", alignItems: "center", gap: 5 }}><StatusDot status={b} size={7} /><span style={{ color: STATUS[b].color, fontFamily: "monospace", fontWeight: 800, fontSize: 12 }}>{c[b]}</span><span style={{ color: "#8B949E", fontSize: 10 }}>{TL_SHORT[b]}</span></span>)}
      </div>
      {moves.length > 0 && <div style={{ marginBottom: 10 }}>{moves.map(([id, t]) => <span key={id} style={{ display: "inline-block", marginRight: 8, marginBottom: 4, fontSize: 10, fontFamily: "monospace", color: "#fff", background: STATUS[t.to].color + "22", border: "1px solid " + STATUS[t.to].color, borderRadius: 4, padding: "2px 7px" }}>{id}: {t.from} → {t.to} ◆</span>)}</div>}
      <div style={{ fontSize: 10, color: "#8B949E", marginBottom: 8, fontFamily: "monospace" }}>{cards.length} intelligence item(s) published this date</div>
      {cards.map(c => (
        <div key={c.id} style={{ padding: "8px 0", borderTop: "1px solid #1b1f27" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3, flexWrap: "wrap" }}>
            <span style={{ fontSize: 8.5, fontWeight: 800, color: SEVERITY[c.severity].color, fontFamily: "monospace", letterSpacing: 1 }}>{SEVERITY[c.severity].label}</span>
            <span style={{ fontSize: 8.5, color: "#58A6FF", background: "#58A6FF10", padding: "1px 6px", borderRadius: 3, fontFamily: "monospace" }}>{c.type}</span>
            {c.gapsAffected.length > 0 && <span style={{ fontSize: 9, color: "#00D4AA", fontFamily: "monospace" }}>affects: {c.gapsAffected.join(", ")}</span>}
          </div>
          <div style={{ fontSize: 12, color: "#E6EDF3", fontWeight: 600 }}>{c.title}</div>
        </div>
      ))}
    </div>
  );
}

// ============================================
// DOCS — published documents from docs/ folder
// ============================================
const DOC_TYPE_COLORS = { Whitepaper: "#58A6FF", "Research Paper": "#BC8CFF", "Technical Brief": "#00D4AA", Report: "#FFAA33" };

function DocsRegistry({ docs }) {
  return (
    <div>
      <p style={{ color: "#8B949E", fontSize: 12, marginBottom: 18, lineHeight: 1.5 }}>
        Published documents (v1.0+). Pre-publication research papers and working drafts are available in the <a href="https://github.com/greycardinal45/ai-hydra-tracker/tree/main/docs" style={{ color: "#58A6FF" }}>docs/</a> directory.
      </p>
      {!docs.length && <div style={{ color: "#6e7681", fontSize: 12, fontFamily: "monospace", padding: "20px 0" }}>No published documents yet.</div>}
      {docs.sort((a, b) => b.date.localeCompare(a.date)).map((d, i) => (
        <div key={i} style={{ marginBottom: 12, background: "#161B22", borderRadius: 6, border: "1px solid #1b1f27", padding: "18px 20px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 9, fontWeight: 800, color: DOC_TYPE_COLORS[d.type] || "#8B949E", background: (DOC_TYPE_COLORS[d.type] || "#8B949E") + "12", border: "1px solid " + (DOC_TYPE_COLORS[d.type] || "#8B949E") + "25", padding: "2px 8px", borderRadius: 3, letterSpacing: 1.2, fontFamily: "monospace" }}>{d.type.toUpperCase()}</span>
            <span style={{ fontSize: 10, color: "#8B949E", fontFamily: "monospace" }}>v{d.version}</span>
            <span style={{ fontSize: 10, color: "#8B949E", fontFamily: "monospace" }}>{d.date}</span>
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#E6EDF3", marginBottom: 6 }}>{d.title}</div>
          <div style={{ fontSize: 12, color: "#8B949E", lineHeight: 1.55, marginBottom: 12 }}>{d.description}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <a href={"docs/" + d.filename} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "#1f6feb", color: "#fff", fontSize: 11, fontWeight: 700, textDecoration: "none", padding: "6px 14px", borderRadius: 5, border: "1px solid #388bfd" }}>Download PDF</a>
            {d.author && <span style={{ fontSize: 10, color: "#6e7681" }}>{d.author}</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ============================================
// MAIN
// ============================================
function App() {
  const [tab, setTab] = useState("gaps");
  const [gaps, setGaps] = useState([]);
  const [intel, setIntel] = useState([]);
  const [changelog, setChangelog] = useState([]);
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    Promise.all([
      fetch("data/gaps.json").then(r => r.json()),
      fetch("data/intel.json").then(r => r.json()),
      fetch("data/changelog.json").then(r => r.json()),
      fetch("docs/index.json").then(r => r.json()).catch(() => []),
    ]).then(([g, i, c, d]) => { setGaps(g); setIntel(i); setChangelog(c); setDocs(d); setLoading(false); })
      .catch(e => { console.error(e); setError(String(e)); setLoading(false); });
  }, []);

  const counts = useMemo(() => { const c = { exists: 0, partial: 0, gap: 0 }; gaps.forEach(g => c[g.status]++); return c; }, [gaps]);

  if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#6e7681", fontFamily: "monospace" }}>Loading framework data…</div>;
  if (error) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#FF6B6B", fontFamily: "monospace" }}>Failed to load data: {error}</div>;

  return (
    <div style={{ background: "#0D1117", minHeight: "100vh", color: "#E6EDF3", fontFamily: "'Segoe UI', -apple-system, sans-serif" }}>
      <div style={{ borderBottom: "1px solid #1b1f27", padding: "18px 20px" }}>
        <div style={{ maxWidth: 1060, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#FF6B6B", animation: "pulse 2s infinite" }} />
            <span style={{ color: "#FF6B6B", fontSize: 9, fontFamily: "monospace", textTransform: "uppercase", letterSpacing: 2, fontWeight: 800 }}>Live Intelligence Tracker</span>
          </div>
          <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 4px", letterSpacing: -0.5 }}>The AI Hydra — Threat Capability Framework</h1>
          <p style={{ color: "#8B949E", fontSize: 12, margin: "2px 0 0", fontStyle: "italic" }}>When Worms Learn to Think — Capability Framework</p>
          <p style={{ color: "#6e7681", fontSize: 11, margin: "4px 0 0" }}>Tracking the convergence of autonomous AI, offensive cyber tooling, and the engineering gaps that remain.</p>
          <div style={{ display: "flex", gap: 18, marginTop: 12 }}>
            {Object.entries(STATUS).map(([k, v]) => (
              <div key={k} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <StatusDot status={k} size={7} />
                <span style={{ color: v.color, fontSize: 11, fontWeight: 800, fontFamily: "monospace" }}>{counts[k]}</span>
                <span style={{ color: "#8B949E", fontSize: 10 }}>{v.label}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 20px 50px" }}>
        <TabBar tabs={[
          { id: "architecture", label: "Architecture" },
          { id: "gaps", label: "Gap Analysis", count: gaps.length },
          { id: "intel", label: "Intelligence", count: intel.length },
          { id: "timeline", label: "Timeline", count: intel.length },
          { id: "docs", label: "Docs", count: docs.length },
        ]} active={tab} onChange={setTab} />
        {tab === "architecture" && <Architecture />}
        {tab === "gaps" && <GapAnalysis gaps={gaps} intel={intel} />}
        {tab === "intel" && <IntelRegistry intel={intel} />}
        {tab === "timeline" && <Timeline gaps={gaps} intel={intel} />}
        {tab === "docs" && <DocsRegistry docs={docs} />}
      </div>
      <div style={{ borderTop: "1px solid #1b1f27", padding: "14px 20px", textAlign: "center" }}>
        <span style={{ color: "#8B949E", fontSize: 10 }}>Darren Humphries · Group CISO · CC BY 4.0 · Infosec Europe 2026 · <a href="docs/AI-Hydra-Whitepaper.pdf" style={{ color: "#58A6FF" }}>Whitepaper (PDF)</a> · <a href="https://github.com/greycardinal45/ai-hydra-tracker">GitHub</a></span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
