<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useMemo}=React;
const DATA = {"caps":[{"id":"ia-1","name":"Autonomous vulnerability scanning","phase":"Initial Access & Recon","status":"exists"},{"id":"ia-2","name":"Autonomous exploit execution","phase":"Initial Access & Recon","status":"exists"},{"id":"ia-3","name":"AI-generated spearphishing","phase":"Initial Access & Recon","status":"exists"},{"id":"ia-4","name":"Zero-day discovery","phase":"Initial Access & Recon","status":"exists"},{"id":"ia-5","name":"Zero-day weaponisation (logic flaws)","phase":"Initial Access & Recon","status":"partial"},{"id":"cl-1","name":"Mimikatz / LSASS / Kerberoasting","phase":"Credential & Lateral Movement","status":"exists"},{"id":"cl-2","name":"Living off the land (PS, WMI, PsExec)","phase":"Credential & Lateral Movement","status":"exists"},{"id":"cl-3","name":"AI-driven lateral movement decisions","phase":"Credential & Lateral Movement","status":"partial"},{"id":"cl-4","name":"Autonomous privilege escalation","phase":"Credential & Lateral Movement","status":"partial"},{"id":"ao-1","name":"Attack surface assessment","phase":"AI Orchestration","status":"exists"},{"id":"ao-2","name":"Real-time tool selection","phase":"AI Orchestration","status":"partial"},{"id":"ao-3","name":"Environment value assessment","phase":"AI Orchestration","status":"partial"},{"id":"ao-4","name":"CTF objective matching","phase":"AI Orchestration","status":"partial"},{"id":"ao-5","name":"Adaptive evasion (vs SOC hunting)","phase":"AI Orchestration","status":"gap"},{"id":"c2-1","name":"C2 via legitimate cloud services","phase":"Hybrid C2 & Comms","status":"exists"},{"id":"c2-2","name":"Domain fronting / CDN abuse","phase":"Hybrid C2 & Comms","status":"exists"},{"id":"c2-3","name":"Polymorphic timing","phase":"Hybrid C2 & Comms","status":"partial"},{"id":"c2-4","name":"Dynamic C2 rotation","phase":"Hybrid C2 & Comms","status":"partial"},{"id":"c2-5","name":"Legitimate user traffic mimicry","phase":"Hybrid C2 & Comms","status":"gap"},{"id":"pc-1","name":"Multi-mechanism persistence","phase":"Persistence & Collection","status":"exists"},{"id":"pc-2","name":"Selective data identification by LLM","phase":"Persistence & Collection","status":"exists"},{"id":"pc-3","name":"Slow exfiltration via legitimate channels","phase":"Persistence & Collection","status":"exists"},{"id":"pc-4","name":"Ongoing evolving IP collection","phase":"Persistence & Collection","status":"exists"},{"id":"ev-1","name":"Polymorphic code mutation","phase":"Evasion & Anti-Detection","status":"exists"},{"id":"ev-2","name":"EDR-specific evasion development","phase":"Evasion & Anti-Detection","status":"exists"},{"id":"ev-3","name":"AI real-time evasion adaptation","phase":"Evasion & Anti-Detection","status":"partial"},{"id":"ev-4","name":"Autonomous log cleaning","phase":"Evasion & Anti-Detection","status":"partial"},{"id":"sd-1","name":"Exploit development teams","phase":"SDLC / Weapons Pipeline","status":"exists"},{"id":"sd-2","name":"AI-assisted exploit development","phase":"SDLC / Weapons Pipeline","status":"exists"},{"id":"sd-3","name":"Automated field-to-foundry feedback loop","phase":"SDLC / Weapons Pipeline","status":"gap"},{"id":"sd-4","name":"OTA implant deployment via C2","phase":"SDLC / Weapons Pipeline","status":"partial"},{"id":"ip-1","name":"Selective IP targeting (capture the flag)","phase":"AI Orchestration","status":"gap"}],"intel":[{"id":"intel-gtig-zeroday","date":"2026-05-11","title":"First AI-developed zero-day exploit identified","type":"Zero-day","severity":"critical","gapsAffected":["ia-5"]},{"id":"intel-promptspy","date":"2026-05-11","title":"PROMPTSPY: autonomous Android malware with Gemini C2","type":"Autonomous malware","severity":"high","gapsAffected":["c2-4","ev-3","ao-2"]},{"id":"intel-canfail","date":"2026-05-11","title":"CANFAIL / LONGSTREAM: AI-generated decoy code for analyst evasion","type":"Evasion","severity":"medium","gapsAffected":["ev-3"]},{"id":"intel-shai-hulud","date":"2026-05-11","title":"Mini Shai-Hulud Wave 5: first cross-registry self-propagating supply chain worm","type":"Supply chain worm","severity":"critical","gapsAffected":["c2-1","pc-1","pc-3"]},{"id":"intel-h3-growth","date":"2026-03-19","title":"Horizon3.ai: 3rd fastest growing company in North America — 19,939% revenue growth","type":"Autonomous pentesting","severity":"high","gapsAffected":["ia-1","ia-2","ao-1"]},{"id":"intel-h3-hvt","date":"2026-01-20","title":"NodeZero High-Value Targeting: LLM-driven attack path prioritisation","type":"Autonomous pentesting","severity":"high","gapsAffected":["ao-1","ao-2","cl-3"]},{"id":"intel-h3-cloud","date":"2026-03-01","title":"NodeZero cloud pentesting: autonomous on-prem to Azure Entra ID Global Admin","type":"Autonomous pentesting","severity":"high","gapsAffected":["ia-2","cl-3","cl-4"]},{"id":"intel-pentagi","date":"2026-04-22","title":"PentAGI: open-source fully autonomous multi-agent pentesting system","type":"Autonomous pentesting","severity":"high","gapsAffected":["ia-1","ia-2","ao-1","ao-2"]},{"id":"intel-xbow","date":"2025-06-15","title":"XBOW: first autonomous system to reach #1 on HackerOne global leaderboard","type":"Autonomous pentesting","severity":"high","gapsAffected":["ia-1","ia-2","ao-1"]},{"id":"intel-darpa-aixcc","date":"2025-08-15","title":"DARPA AIxCC: $4M grand prize — autonomous systems find and patch vulnerabilities at machine speed","type":"Autonomous pentesting","severity":"high","gapsAffected":["ia-1","cl-3"]},{"id":"intel-mythos","date":"2026-04-07","title":"Anthropic Mythos Preview: zero-days in every major OS and browser — too capable to release","type":"AI vulnerability discovery","severity":"critical","gapsAffected":["ia-4","cl-4"]},{"id":"intel-china-claude","date":"2025-11-15","title":"Chinese state-sponsored group automates 80-90% of cyber campaign via jailbroken Claude Code","type":"Nation-state AI ops","severity":"critical","gapsAffected":["ao-1","ao-2"]},{"id":"intel-artemis","date":"2025-12-15","title":"ARTEMIS: autonomous AI beats 9 of 10 human pentesters on live enterprise network","type":"Autonomous pentesting","severity":"high","gapsAffected":["ia-1","ia-2","cl-3"]},{"id":"intel-promptflux","date":"2026-02-12","title":"PROMPTFLUX: LLM-driven runtime malware code rewriting to evade specific EDR signatures","type":"Polymorphic malware","severity":"high","gapsAffected":["ev-1","c2-3"]},{"id":"intel-openai-high","date":"2026-02-01","title":"GPT 5.3-Codex reaches 'High' cybersecurity threshold on OpenAI Preparedness Framework","type":"Capability threshold","severity":"high","gapsAffected":["ia-4","ia-5"]},{"id":"intel-vibeware","date":"2026-03-01","title":"Cloud Security Alliance defines 'vibeware': AI-assisted malware industrialisation","type":"Threat model","severity":"medium","gapsAffected":["ev-1"]},{"id":"intel-harfanglab","date":"2026-05-20","title":"HarfangLab 2026 Threatscape: 188% YoY supply chain attack increase and systematic automation prediction","type":"Threat prediction","severity":"medium","gapsAffected":[]},{"id":"intel-apt34-c2","date":"2025-06-01","title":"APT34 (OilRig): C2 via OneDrive and Exchange Online — legitimate cloud channel abuse","type":"APT C2 technique","severity":"high","gapsAffected":["c2-1"]},{"id":"intel-apt35-c2","date":"2025-06-01","title":"APT35 (Charming Kitten): C2 via Dropbox, Google Drive, and IPFS","type":"APT C2 technique","severity":"high","gapsAffected":["c2-1"]},{"id":"intel-muddywater-c2","date":"2025-06-01","title":"MuddyWater: C2 via legitimate remote administration tools","type":"APT C2 technique","severity":"high","gapsAffected":["c2-1","cl-2"]},{"id":"intel-gtig-gtg1002","date":"2026-05-11","title":"GTIG: Chinese threat actor GTG-1002 achieves 80% autonomous operation using LLMs","type":"Nation-state AI ops","severity":"critical","gapsAffected":["ao-1","ao-2","ia-2"]},{"id":"intel-frontier-trajectory","date":"2026-04-15","title":"Frontier model offensive security capability: near-zero to 73% success in 12 months","type":"Capability threshold","severity":"critical","gapsAffected":["ia-4","ia-5","cl-4"]},{"id":"intel-ransomware-ai","date":"2025-12-01","title":"80% of ransomware attacks now incorporate AI at some stage of the operation","type":"Threat landscape","severity":"high","gapsAffected":["ia-3","ev-1"]},{"id":"intel-polymorphic-76","date":"2025-12-01","title":"76% of detected malware exhibits AI-driven polymorphic behaviour","type":"Evasion","severity":"high","gapsAffected":["ev-1"]},{"id":"intel-lumu-aic2","date":"2025-12-01","title":"Lumu prediction: AI-C2 frameworks with corporate telemetry fine-tuning","type":"Threat prediction","severity":"medium","gapsAffected":["c2-3","c2-5"]},{"id":"intel-promptsteal","date":"2025-11-05","title":"PromptSteal (APT28) and QuietVault — in-the-wild LLM-driven data collection","type":"Nation-state AI ops","severity":"high","gapsAffected":["pc-2","ao-2","ip-1"]},{"id":"intel-ransomware3","date":"2025-08-28","title":"Ransomware 3.0 — self-composing, LLM-orchestrated ransomware POC","type":"Autonomous malware","severity":"high","gapsAffected":["ao-3","ip-1","pc-2"]},{"id":"intel-miasma","date":"2026-06-01","title":"Miasma — Red Hat npm scope compromised by commoditised Mini Shai-Hulud variant","type":"Supply chain worm","severity":"high","gapsAffected":["c2-1","c2-4","ao-3","ip-1"]},{"id":"intel-clawchain","date":"2026-05-18","title":"Claw Chain — four chained CVEs hijack OpenClaw autonomous AI agents","type":"Threat model","severity":"medium","gapsAffected":["c2-5","ao-1","ao-2","cl-4"]},{"id":"intel-agent-hijack","date":"2026-02-01","title":"Agent hijacking — stealing the orchestration layer rather than building it","type":"Threat model","severity":"medium","gapsAffected":["ao-1","ao-2","cl-3","c2-5"]},{"id":"intel-aisi-pan-benchmark","date":"2026-05-01","title":"UK AISI + Palo Alto Networks — frontier models approaching autonomous enterprise intrusion in controlled testing","type":"Capability threshold","severity":"high","gapsAffected":["cl-3","cl-4","pc-1"]}]};
const CAPS = DATA.caps;            // {id,name,phase,status}
const INTEL = DATA.intel;          // {id,date,title,type,severity,gapsAffected}
const COL={exists:"#00D4AA",partial:"#FFAA33",gap:"#FF6B6B"};
const LABEL={exists:"EXISTS",partial:"PARTIAL",gap:"GAP"};
const BANDS=["exists","partial","gap"];
const CAP_BY_ID=Object.fromEntries(CAPS.map(c=>[c.id,c]));

// phase order as first-seen in data
const PHASES=[]; CAPS.forEach(c=>{if(!PHASES.includes(c.phase))PHASES.push(c.phase)});
const rank={exists:0,partial:1,gap:2};
const GORDER=[...CAPS].map(c=>c.id).sort((a,b)=>{
  const ra=rank[CAP_BY_ID[a].status],rb=rank[CAP_BY_ID[b].status];
  return ra!==rb?ra-rb:a.localeCompare(b);
});
// heatmap rows grouped by phase (data order within phase)
const ROWS=[]; PHASES.forEach(ph=>CAPS.filter(c=>c.phase===ph).forEach(c=>ROWS.push(c.id)));

// ---- reconstruction ----
const S11=["ia-5","c2-4","ev-3"];
function statusAt(id,d){
  if(S11.includes(id)) return d>="2026-05-11"?"partial":"gap";
  if(id==="pc-2") return d>="2026-06-04"?"exists":"partial";
  if(id==="ao-3") return d>="2026-06-04"?"partial":"gap";
  return CAP_BY_ID[id].status;
}
function strengthAt(id,d){ let n=0; for(const c of INTEL){ if(c.date<=d && c.gapsAffected.includes(id)) n++; } return n; }

// heatmap increments = distinct intel dates >= START, plus the brief milestone
const START="2026-01-15";
let DSET=Array.from(new Set(INTEL.map(c=>c.date).filter(d=>d>=START)));
if(!DSET.includes("2026-06-04")) DSET.push("2026-06-04");
const DATES=DSET.sort();

// curated story milestones
const STORY=[
  {date:"2026-05-01",label:"First publication",trig:"Gap analysis"},
  {date:"2026-05-11",label:"GTIG Threat Tracker",trig:"3 gaps → partial"},
  {date:"2026-05-14",label:"Shai-Hulud W5",trig:"greens strengthen"},
  {date:"2026-06-04",label:"Infosec Europe",trig:"+8 citations"},
  {date:"2026-06-04",label:"PromptSteal",trig:"pc-2 → exists"},
  {date:"2026-06-04",label:"Ransomware 3.0",trig:"ao-3 → partial"},
];
function statusStory(id,idx){
  if(S11.includes(id)) return idx>=1?"partial":"gap";
  if(id==="pc-2") return idx>=4?"exists":"partial";
  if(id==="ao-3") return idx>=5?"partial":"gap";
  return CAP_BY_ID[id].status;
}
const MOVERS=new Set([...S11,"pc-2","ao-3"]);

function Dot({s,size=9}){return <span style={{display:"inline-block",width:size,height:size,borderRadius:"50%",background:COL[s]}}/>;}

// ============ STREAMGRAPH strip (100% stacked bars per increment) ============
function counts(statusFn,key){ const c={exists:0,partial:0,gap:0}; ROWS.forEach(id=>c[statusFn(id,key)]++); return c; }

// ============ HEATMAP ============
function Heatmap({sel,setSel}){
  const maxStr=useMemo(()=>{let m=1; for(const id of ROWS) for(const d of DATES) m=Math.max(m,strengthAt(id,d)); return m;},[]);
  const milestone=useMemo(()=>DATES.map((d,j)=>{ if(j===0)return false; return ROWS.some(id=>statusAt(id,d)!==statusAt(id,DATES[j-1])); }),[]);
  const [hover,setHover]=useState(null);
  const LX=250, TOP=86, CW=Math.max(34,Math.min(54,820/DATES.length)), CH=19, BOT=78;
  const W=LX+DATES.length*CW+20, H=TOP+ROWS.length*CH+BOT;
  return (
   <div className="scroll">
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",minWidth:Math.min(W,960),display:"block"}}>
      {/* streamgraph strip */}
      <text x={LX} y={20} fill="#8B949E" fontSize="10" fontFamily="monospace">AGGREGATE  ·  gap → partial → exists (/{ROWS.length})</text>
      {DATES.map((d,j)=>{
        const c=counts(statusAt,d); const x=LX+j*CW+CW*0.18, bw=CW*0.64; const y0=28, hgt=46; const tot=ROWS.length;
        const hg=hgt*c.gap/tot, hp=hgt*c.partial/tot, he=hgt*c.exists/tot;
        return (<g key={d}>
          <rect x={x} y={y0} width={bw} height={hg} fill={COL.gap} opacity="0.9"/>
          <rect x={x} y={y0+hg} width={bw} height={hp} fill={COL.partial} opacity="0.9"/>
          <rect x={x} y={y0+hg+hp} width={bw} height={he} fill={COL.exists} opacity="0.9"/>
        </g>);
      })}
      {/* phase labels + separators */}
      {(()=>{let acc=[];let y=TOP;PHASES.forEach(ph=>{const n=ROWS.filter(id=>CAP_BY_ID[id].phase===ph).length;const y0=y,y1=y+n*CH;acc.push(
        <g key={ph}>
          <line x1={6} y1={y1} x2={LX+DATES.length*CW} y2={y1} stroke="#1b1f27" strokeWidth="0.7"/>
          <text x={10} y={(y0+y1)/2} fill="#8B949E" fontSize="8" fontFamily="monospace" transform={`rotate(-90 10 ${(y0+y1)/2})`} textAnchor="middle">{ph.toUpperCase().slice(0,22)}</text>
        </g>);y=y1;});return acc;})()}
      {/* cells */}
      {ROWS.map((id,i)=>{
        const y=TOP+i*CH;
        return (<g key={id}>
          <text x={LX-58} y={y+CH/2+3} fill="#E6EDF3" fontSize="9" fontFamily="monospace" textAnchor="end">{id}</text>
          <text x={LX-6} y={y+CH/2+3} fill="#8B949E" fontSize="8" textAnchor="end">{CAP_BY_ID[id].name.slice(0,30)}</text>
          {DATES.map((d,j)=>{
            const s=statusAt(id,d), strv=strengthAt(id,d), op=0.26+0.74*(strv/maxStr);
            const x=LX+j*CW+CW*0.1, w=CW*0.8;
            return <rect key={d} x={x} y={y+1.5} width={w} height={CH-3} rx="2" fill={COL[s]} fillOpacity={op}
              stroke={hover&&hover.id===id&&hover.d===d?"#fff":"none"} strokeWidth="1"
              onMouseEnter={()=>setHover({id,d,s,strv})} onMouseLeave={()=>setHover(null)}/>;
          })}
        </g>);
      })}
      {/* milestone column highlights + date headers */}
      {DATES.map((d,j)=>{
        const x=LX+j*CW+CW/2;
        return (<g key={d}>
          {milestone[j] && <rect x={LX+j*CW} y={TOP-2} width={CW} height={ROWS.length*CH+4} fill="#ffffff" opacity="0.05"/>}
          <rect x={LX+j*CW} y={TOP-2} width={CW} height={ROWS.length*CH+4} fill="transparent" style={{cursor:"pointer"}} onClick={()=>setSel(d)}/>
          <text x={x} y={TOP+ROWS.length*CH+12} fill={milestone[j]?"#fff":(sel===d?"#00D4AA":"#8B949E")} fontSize="8.5" fontFamily="monospace"
                fontWeight={milestone[j]?"bold":"normal"} transform={`rotate(90 ${x} ${TOP+ROWS.length*CH+12})`} textAnchor="start">{d}{milestone[j]?"  ◆":""}</text>
        </g>);
      })}
      {hover && <g>
        <rect x={LX+10} y={6} width={230} height={34} rx="4" fill="#161B22" stroke="#21262d"/>
        <text x={LX+18} y={20} fill="#E6EDF3" fontSize="9" fontFamily="monospace">{hover.id} · {LABEL[hover.s]}</text>
        <text x={LX+18} y={33} fill="#8B949E" fontSize="8">{CAP_BY_ID[hover.id].name.slice(0,32)} · strength {hover.strv}</text>
      </g>}
    </svg>
   </div>
  );
}

// ============ ALLUVIAL (story) ============
function ribbon(x0,x1,a0,a1,b0,b1){const xm=(x0+x1)/2;return `M ${x0} ${a0} C ${xm} ${a0}, ${xm} ${a1}, ${x1} ${a1} L ${x1} ${b1} C ${xm} ${b1}, ${xm} ${b0}, ${x0} ${b0} Z`;}
function Alluvial({sel,setSel}){
  const PR=0.16, PB=2.2;
  const lay=useMemo(()=>{
    const cols=STORY.map((m,idx)=>{
      const th={}, st={}; GORDER.forEach(id=>{th[id]=0.8+0.5*strengthAt(id,m.date); st[id]=statusStory(id,idx);});
      const bc={exists:[],partial:[],gap:[]}; GORDER.forEach(id=>bc[st[id]].push(id));
      let tot=PB*2; BANDS.forEach(b=>{tot+=bc[b].reduce((s,id)=>s+th[id],0)+PR*Math.max(0,bc[b].length-1);});
      return {th,st,bc,tot};
    });
    const H=Math.max(...cols.map(c=>c.tot));
    const pos=cols.map(c=>{let y=(H-c.tot)/2; const p={}; BANDS.forEach(b=>{c.bc[b].forEach(id=>{p[id]=[y,y+c.th[id]];y+=c.th[id]+PR;}); if(c.bc[b].length)y-=PR; y+=PB;}); return p;});
    return {cols,pos,H};
  },[]);
  const N=STORY.length, LXp=70, CWp=150, NW=26, scale=520/lay.H, top=70;
  const W=LXp+(N-1)*CWp+NW+30, Hpx=top+lay.H*scale+90;
  const Y=v=>top+v*scale;
  return (
   <div className="scroll">
    <svg viewBox={`0 0 ${W} ${Hpx}`} style={{width:"100%",minWidth:Math.min(W,900),display:"block"}}>
      {/* band labels from col0 */}
      {BANDS.map(b=>{const ids=lay.cols[0].bc[b]; if(!ids.length)return null; const ys=ids.map(id=>lay.pos[0][id]); const y0=Math.min(...ys.map(a=>a[0])),y1=Math.max(...ys.map(a=>a[1]));
        return <text key={b} x={LXp-44} y={Y((y0+y1)/2)} fill={COL[b]} fontSize="11" fontWeight="bold" fontFamily="monospace" transform={`rotate(-90 ${LXp-44} ${Y((y0+y1)/2)})`} textAnchor="middle">{LABEL[b]}</text>;
      })}
      {/* ribbons */}
      {Array.from({length:N-1}).map((_,i)=>{
        const x0=LXp+i*CWp+NW, x1=LXp+(i+1)*CWp;
        return GORDER.map(id=>{
          const [a0,a1]=lay.pos[i][id],[b0,b1]=lay.pos[i+1][id];
          const mv=lay.cols[i].st[id]!==lay.cols[i+1].st[id];
          const col=COL[mv?lay.cols[i+1].st[id]:lay.cols[i].st[id]];
          const isM=MOVERS.has(id);
          const xm=(x0+x1)/2;
          const dpath=`M ${x0} ${Y(a0)} C ${xm} ${Y(a0)}, ${xm} ${Y(b0)}, ${x1} ${Y(b0)} L ${x1} ${Y(b1)} C ${xm} ${Y(b1)}, ${xm} ${Y(a1)}, ${x0} ${Y(a1)} Z`;
          return <path key={id+i} d={dpath} fill={col} fillOpacity={isM?(mv?0.95:0.6):0.42} stroke={mv?"#fff":"none"} strokeWidth={mv?1.1:0}/>;
        });
      })}
      {/* node stubs + headers */}
      {STORY.map((m,i)=>{
        const x=LXp+i*CWp; const c=counts((id,idx)=>statusStory(id,i),i);
        return (<g key={i}>
          {GORDER.map(id=>{const [y0,y1]=lay.pos[i][id]; return <rect key={id} x={x} y={Y(y0)} width={NW} height={Y(y1)-Y(y0)} fill={COL[lay.cols[i].st[id]]} stroke="#0D1117" strokeWidth="0.4" opacity={MOVERS.has(id)?0.95:0.8}/>;})}
          <rect x={x-6} y={top-6} width={NW+12} height={lay.H*scale+12} fill="transparent" style={{cursor:"pointer"}} onClick={()=>setSel(m)}/>
          <text x={x+NW/2} y={top-30} fill="#E6EDF3" fontSize="10.5" fontWeight="bold" textAnchor="middle">{m.label}</text>
          <text x={x+NW/2} y={top-17} fill="#8B949E" fontSize="8.5" fontFamily="monospace" textAnchor="middle">{m.date}</text>
          <text x={x+NW/2} y={Y(lay.H)+18} fill="#E6EDF3" fontSize="9.5" fontFamily="monospace" fontWeight="bold" textAnchor="middle">{c.exists}/{c.partial}/{c.gap}</text>
          <text x={x+NW/2} y={Y(lay.H)+30} fill="#8B949E" fontSize="8" textAnchor="middle">{m.trig}</text>
        </g>);
      })}
    </svg>
   </div>
  );
}

// ============ DETAIL PANEL ============
function Detail({date}){
  if(!date) return <div style={{color:"#8B949E",fontSize:12,padding:"14px 0"}}>Click a column / milestone above to see the intel that landed at that step.</div>;
  const cards=INTEL.filter(c=>c.date===date).sort((a,b)=>a.title.localeCompare(b.title));
  const c=counts(statusAt,date);
  return (
    <div style={{marginTop:14,padding:"14px 16px",background:"#161B22",border:"1px solid #21262d",borderRadius:8}}>
      <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <span style={{fontFamily:"monospace",fontWeight:800,fontSize:13}}>{date}</span>
        {BANDS.map(b=><span key={b} style={{display:"flex",alignItems:"center",gap:5}}><Dot s={b} size={7}/><span style={{color:COL[b],fontFamily:"monospace",fontWeight:800,fontSize:12}}>{c[b]}</span><span style={{color:"#8B949E",fontSize:10}}>{LABEL[b]}</span></span>)}
      </div>
      <div style={{fontSize:10,color:"#8B949E",marginBottom:8,fontFamily:"monospace"}}>{cards.length} intelligence item(s) published this step</div>
      {cards.length===0 && <div style={{color:"#8B949E",fontSize:11}}>No new intel card dated here (strength continues to accrue from prior items).</div>}
      {cards.map(c=>(
        <div key={c.id} style={{padding:"8px 0",borderTop:"1px solid #1b1f27"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
            <span style={{fontSize:8.5,fontWeight:800,color:COL[c.severity==="critical"?"gap":c.severity==="high"?"partial":"exists"],fontFamily:"monospace",letterSpacing:1}}>{c.severity.toUpperCase()}</span>
            <span style={{fontSize:8.5,color:"#58A6FF",background:"#58A6FF10",padding:"1px 6px",borderRadius:3,fontFamily:"monospace"}}>{c.type}</span>
            <span style={{fontSize:9,color:"#00D4AA",fontFamily:"monospace"}}>affects: {c.gapsAffected.join(", ")||"—"}</span>
          </div>
          <div style={{fontSize:12,color:"#E6EDF3",fontWeight:600}}>{c.title}</div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [view,setView]=useState("heatmap");
  const [selDate,setSelDate]=useState(null);
  const [selStory,setSelStory]=useState(null);
  const tabs=[{id:"heatmap",label:"Backbone · heatmap (scales to N)"},{id:"story",label:"Story · alluvial (milestones)"}];
  return (
    <div className="wrap">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:"#FF6B6B"}}/>
        <span style={{color:"#FF6B6B",fontSize:9,fontFamily:"monospace",letterSpacing:2,fontWeight:800}}>PROTOTYPE · CAPABILITY EVOLUTION TIMELINE</span>
      </div>
      <h1 style={{fontSize:22,fontWeight:800,letterSpacing:-0.5,marginBottom:4}}>The AI Hydra — how the {CAPS.length} capabilities strengthened over time</h1>
      <p style={{color:"#8B949E",fontSize:12,marginBottom:16}}>Same data as the live tracker. Colour = status · brightness/thickness = weight of corroborating intel · ◆ = a step where a capability changed status. Click a step for the underlying intel.</p>
      <div style={{display:"flex",marginBottom:18}}>
        <div style={{display:"inline-flex",gap:3,padding:3,background:"#161B22",border:"1px solid #21262d",borderRadius:8}}>
          {tabs.map(t=>{const on=view===t.id;return <button key={t.id} onClick={()=>setView(t.id)} style={{padding:"8px 16px",border:"none",borderRadius:5,fontFamily:"monospace",fontSize:11,fontWeight:on?800:700,background:on?"#00D4AA":"transparent",color:on?"#0D1117":"#8B949E"}}>{t.label}</button>;})}
        </div>
      </div>
      {view==="heatmap" ? <Heatmap sel={selDate} setSel={setSelDate}/> : <Alluvial sel={selStory} setSel={setSelStory}/>}
      {view==="heatmap" ? <Detail date={selDate}/> : <Detail date={selStory?selStory.date:null}/>}
      <div style={{borderTop:"1px solid #1b1f27",marginTop:30,paddingTop:14,color:"#8B949E",fontSize:10}}>
        Darren Humphries · Group CISO · prototype for review · reconstructed status history ({CAPS.length} capabilities; framework opened at 34, consolidated to {CAPS.length})
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
